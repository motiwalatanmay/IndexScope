name: Update index data

on:
  schedule:
    # 9:00 AM IST = 03:30 UTC, 7:00 PM IST = 13:30 UTC
    - cron: "30 3 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-indices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Fetch NSE /api/allIndices and upsert data/*.json
        run: python scripts/fetch_indices.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh NSE indices ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
